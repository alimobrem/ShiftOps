# OpenShift Pulse Helm Values

replicas: 2

image:
  repository: quay.io/amobrem/openshiftpulse
  tag: latest
  pullPolicy: Always

# OAuth proxy sidecar — image tag is auto-detected by deploy.sh
oauthProxy:
  image: ""  # Set by deploy.sh --set oauthProxy.image=...
  # Secrets are auto-generated on first install if not provided
  clientSecret: ""
  cookieSecret: ""

# Route configuration
route:
  enabled: true
  # Host is auto-detected from the cluster. Override if needed.
  host: ""
  # Cluster apps domain (e.g., apps.mycluster.example.com)
  # Auto-detected by deploy.sh. Used to compute OAuth redirect URI.
  clusterDomain: ""

# Monitoring endpoints (proxied by nginx)
monitoring:
  prometheus:
    enabled: true
    # OpenShift default. Change if monitoring stack is in a different namespace.
    host: thanos-querier.openshift-monitoring.svc:9091
  alertmanager:
    enabled: true
    host: alertmanager-main.openshift-monitoring.svc:9094
  # Self-monitoring: ServiceMonitor + PrometheusRule for Pulse itself
  selfMonitor:
    enabled: true

# Resource limits
resources:
  app:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  oauthProxy:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

# Pulse Agent (AI SRE assistant)
agent:
  enabled: false  # Set to true when deploying with --agent-repo
  # Service name for the agent. If empty, defaults to <release>-openshift-sre-agent.
  # Override when the agent is deployed with a different release name.
  serviceName: ""
  # WS token — set ONE of these:
  #   wsToken: "literal-value"          # deploy.sh injects this
  #   wsTokenSecret: "secret-name"      # reads token from agent's auto-generated secret
  wsToken: ""
  wsTokenSecret: ""  # e.g. pulse-agent-openshift-sre-agent-ws-token
  wsTokenSecretKey: "token"

# Network policy — restricts ingress to OAuth proxy/route and egress to agent + K8s API
networkPolicy:
  enabled: true

# Quota for the namespace — sized for UI (2 pods) + Agent (1 pod) + PostgreSQL (1 pod) + builds
quota:
  enabled: true
  pods: "15"
  requestsCpu: "2"
  requestsMemory: 2Gi
  limitsCpu: "4"
  limitsMemory: 4Gi
