apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openshiftpulse-reader
  labels:
    {{- include "openshiftpulse.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: [configmaps, endpoints, events, namespaces, nodes, persistentvolumeclaims, persistentvolumes, pods, pods/log, replicationcontrollers, resourcequotas, secrets, serviceaccounts, services]
  verbs: [get, list, watch]
- apiGroups: [apps]
  resources: [daemonsets, deployments, replicasets, statefulsets]
  verbs: [get, list, watch]
- apiGroups: [batch]
  resources: [cronjobs, jobs]
  verbs: [get, list, watch]
- apiGroups: [autoscaling]
  resources: [horizontalpodautoscalers]
  verbs: [get, list, watch]
- apiGroups: [networking.k8s.io]
  resources: [ingresses, networkpolicies]
  verbs: [get, list, watch]
- apiGroups: [storage.k8s.io]
  resources: [storageclasses]
  verbs: [get, list, watch]
- apiGroups: [rbac.authorization.k8s.io]
  resources: [clusterroles, clusterrolebindings, roles, rolebindings]
  verbs: [get, list, watch]
- apiGroups: [apiextensions.k8s.io]
  resources: [customresourcedefinitions]
  verbs: [get, list, watch]
- apiGroups: [route.openshift.io]
  resources: [routes]
  verbs: [get, list, watch]
- apiGroups: [build.openshift.io]
  resources: [buildconfigs, builds]
  verbs: [get, list, watch]
- apiGroups: [image.openshift.io]
  resources: [imagestreams]
  verbs: [get, list, watch]
- apiGroups: [config.openshift.io]
  resources: [clusterversions, infrastructures, clusteroperators]
  verbs: [get, list, watch]
- apiGroups: [operators.coreos.com]
  resources: [clusterserviceversions, subscriptions, catalogsources, installplans, operatorgroups]
  verbs: [get, list, watch]
- apiGroups: [""]
  resources: [componentstatuses]
  verbs: [get, list]
- nonResourceURLs: ["/api", "/api/*", "/apis", "/apis/*", "/version"]
  verbs: [get]
- apiGroups: [authentication.k8s.io]
  resources: [tokenreviews]
  verbs: [create]
- apiGroups: [authorization.k8s.io]
  resources: [subjectaccessreviews]
  verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openshiftpulse-reader
  labels:
    {{- include "openshiftpulse.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openshiftpulse-reader
subjects:
- kind: ServiceAccount
  name: openshiftpulse
  namespace: {{ include "openshiftpulse.namespace" . }}
---
# Grant access to Prometheus/Thanos metrics for dashboard charts
{{- if .Values.monitoring.prometheus.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openshiftpulse-monitoring-view
  labels:
    {{- include "openshiftpulse.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-monitoring-view
subjects:
- kind: ServiceAccount
  name: openshiftpulse
  namespace: {{ include "openshiftpulse.namespace" . }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openshiftpulse-ns
  namespace: {{ include "openshiftpulse.namespace" . }}
rules:
- apiGroups: [""]
  resources: [configmaps, secrets]
  verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openshiftpulse-ns
  namespace: {{ include "openshiftpulse.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openshiftpulse-ns
subjects:
- kind: ServiceAccount
  name: openshiftpulse
  namespace: {{ include "openshiftpulse.namespace" . }}
